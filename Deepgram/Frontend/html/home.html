<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bullshift</title>
  <link rel="stylesheet" href="../css/home.css" />
</head>
<body>

  <header class="navbar">
    <div class="logo-area">
      <img src="../img/logo.png" alt="Bullshift icon" class="logo" />
      <span class="brand-name">Bullshift</span>
    </div>
  </header>

  <main class="hero">

    <img
      src="../img/Ventura.png"
      alt="Cartoon character on the left"
      class="side-character side-character-left"
    />
    <section class="hero-left">
    <h1>
      Spot the truth <br />
      <span class="blue-text">in a world full of</span><br />
      <span class="bullshift-glitch">Bullshift</span>
    </h1>

    <p>
      Bullshift analyzes, filters, and separates truth <br />
      from misinformation.
    </p>
  </section>

  <section class="hero-right">
    <button class="record-button">
      <img src="../img/logo.png" alt="Start recording" />
    </button>

    <p class="record-text">Click here to start recording</p>

    <img
      src="../img/Trump.png"
      alt="Cartoon character on the right"
      class="side-character side-character-right"
   />
  </section>

  </main>

</body>
</html>
