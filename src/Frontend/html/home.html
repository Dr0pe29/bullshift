<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Bullshift</title>

  <link rel="stylesheet" href="../css/home.css" />
  <link rel="stylesheet" href="../components/truthmeter/truthmeter.css" />
  <link rel="stylesheet" href="../css/recording-responsive.css" />
</head>
<body>

  <!-- HOME PAGE -->
  <section class="screen home-screen" id="homeScreen">

    <header class="navbar">
      <div class="logo-area">
        <img src="../img/logo.png" alt="Bullshift icon" class="logo" />
        <span class="brand-name">Bullshift</span>
      </div>
    </header>

    <main class="hero">

      <img
        src="../img/manuel.png"
        alt="Cartoon character on the left"
        class="side-character side-character-left"
      />

      <section class="hero-left">
        <h1>
          Spot the truth <br />
          <span class="blue-text">in a world full of</span><br />
          <span class="bullshift-glitch power-glitch-text">Bullshift</span>
        </h1>

        <p>
          Bullshift analyzes, filters, and separates truth <br />
          from misinformation.
        </p>
      </section>

      <section class="hero-right">
        <button class="record-button" id="startButton">
          <img src="../img/logo.png" alt="Start recording" />
        </button>

        <p class="record-text">Click here to start recording</p>

      </section>

    </main>
  </section>


  <!-- ANALYSIS PAGE -->
  <section class="screen analysis-screen" id="analysisScreen">

    <header class="analysis-header">
      <div class="analysis-brand">
        <div class="logo-placeholder"></div>
        <span class="analysis-brand-name">Recording...</span>
      </div>

      <div class="analysis-actions">
        <button class="show-results-btn" id="showResultsButton">
          Stop & show results
        </button>

        <button class="cancel-recording-btn" id="cancelRecordingButton">
          Cancel recording
        </button>
      </div>
    </header>

    <main class="analysis-content">
      <div class="truthmeter-wrapper">
        <div id="analysisTruthMeter" class="truthmeter" data-value="0" data-show-controls="false">
          <div class="truthmeter-speedometer">
            <div class="truthmeter-arc"></div>
            <div class="truthmeter-needle"></div>

            <div class="truthmeter-center-dot">
              <img src="../img/truthmeter_logo.png" alt="Bullshift logo" />
            </div>
          </div>

          <div class="truthmeter-label"></div>

          <div class="truthmeter-controls">
            <input class="truthmeter-range" type="range" min="0" max="100" value="75" />

            <div class="truthmeter-percentage">
              <span class="truthmeter-percentage-value"></span>%
            </div>
          </div>
        </div>
      </div>

      <section class="transcript-panel">
        <div class="live-text-box">
          <p id="liveText"></p>
          <p id="interimText" class="interim-text"></p>
        </div>
      </section>

      <section class="facts-panel" id="factsPanel">
      </section>

    </main>
  </section>
  
  <script src="../js/speech_live.js"></script>
  <script src="../components/truthmeter/truthmeter.js"></script>
  <script src="../js/button_moving.js"></script>
  <script src="../js/cancel_recording.js"></script>
  <script src="../js/show_results.js"></script>
  <script src="https://unpkg.com/powerglitch@latest/dist/powerglitch.min.js"></script>

  <script>
    PowerGlitch.glitch(".power-glitch-text");
  </script>
  
</body>
</html>
