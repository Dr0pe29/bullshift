<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Realtime Speech to Text Demo</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <img src="./img/bull.png" alt="Bull logo" class="page-logo" />

  <main class="container">
    <h1>Realtime Speech to Text</h1>

    <div class="controls">
      <label for="languageSelect">Language:</label>

      <select id="languageSelect">
        <option value="pt-PT">Portuguese - Portugal</option>
        <option value="pt-BR">Portuguese - Brazil</option>
        <option value="en-US">English - United States</option>
        <option value="en-GB">English - United Kingdom</option>
        <option value="es-ES">Spanish - Spain</option>
        <option value="fr-FR">French - France</option>
        <option value="de-DE">German - Germany</option>
        <option value="it-IT">Italian - Italy</option>
      </select>

      <button id="startBtn">Start Listening</button>
      <button id="stopBtn">Stop Listening</button>
      <button id="clearBtn">Clear</button>
    </div>

    <p id="status">Status: not listening</p>

    <section>
      <h2>Transcript</h2>

      <div class="box">
        <span id="finalText" class="final"></span>
        <span id="interimText" class="interim"></span>
      </div>
    </section>

    <section>
      <h2>Detected sentences</h2>

      <div class="box">
        <ul id="sentences"></ul>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
